<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Savants Logo on dark background
    For favicons, app icons, social avatars
  -->

  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Three arcs forming abstract S -->
  <path d="M 160 150 A 110 110 0 0 1 352 150"
        stroke="#22d3ee" stroke-width="32" stroke-linecap="round" fill="none"/>
  <path d="M 352 256 A 110 110 0 0 1 160 256"
        stroke="#22d3ee" stroke-width="32" stroke-linecap="round" fill="none"
        opacity="0.7"/>
  <path d="M 160 362 A 110 110 0 0 1 352 362"
        stroke="#22d3ee" stroke-width="32" stroke-linecap="round" fill="none"
        opacity="0.4"/>

  <!-- Connecting lines -->
  <line x1="352" y1="150" x2="352" y2="256"
        stroke="#22d3ee" stroke-width="32" stroke-linecap="round" opacity="0.85"/>
  <line x1="160" y1="256" x2="160" y2="362"
        stroke="#22d3ee" stroke-width="32" stroke-linecap="round" opacity="0.55"/>
</svg>
