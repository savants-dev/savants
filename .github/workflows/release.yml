name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config libssl-dev:arm64
          mkdir -p ./.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ./.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ./.cargo/config.toml
        env:
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Install OpenSSL (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        working-directory: .
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PKG_CONFIG_ALLOW_CROSS: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}
          OPENSSL_DIR: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/aarch64-linux-gnu' || '' }}

      - name: Package
        run: |
          mkdir -p dist
          cp ./target/${{ matrix.target }}/release/savants dist/savants-${{ matrix.target }}
          chmod +x dist/savants-${{ matrix.target }}
          cd dist && tar czf savants-${{ matrix.target }}.tar.gz savants-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: savants-${{ matrix.target }}
          path: dist/savants-${{ matrix.target }}.tar.gz

  release:
    name: Create Release + Upload to R2
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/savants-*.tar.gz
          generate_release_notes: true

      - name: Upload to R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          R2_API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/savants-releases/objects"

          for f in artifacts/*/savants-*.tar.gz; do
            FILENAME=$(basename "$f")
            echo "Uploading ${FILENAME}..."

            # Versioned path
            curl -sf -X PUT "${R2_API}/${TAG}/${FILENAME}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/gzip" \
              --data-binary "@${f}"

            # Latest path
            curl -sf -X PUT "${R2_API}/latest/${FILENAME}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/gzip" \
              --data-binary "@${f}"

            echo "Done: ${FILENAME}"
          done

          # Update version.txt
          echo -n "${VERSION}" | curl -sf -X PUT "${R2_API}/latest/version.txt" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary "@-"
          echo "Updated version.txt to ${VERSION}"

          # Update install.sh
          curl -sf -X PUT "${R2_API}/install.sh" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @scripts/install.sh
          echo "Updated install.sh"
