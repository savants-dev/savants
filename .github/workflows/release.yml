name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION="${LATEST_TAG#v}"

          # Parse semver
          MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
          PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)

          # Check commit messages since last tag for version bump hints
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(BREAKING|major|!:)"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release: ${TAG} (previous: ${LATEST_TAG})"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          grep "^version" Cargo.toml

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp ./target/${{ matrix.target }}/release/savants dist/savants-${{ matrix.target }}
          chmod +x dist/savants-${{ matrix.target }}
          cd dist && tar czf savants-${{ matrix.target }}.tar.gz savants-${{ matrix.target }}

      - name: Upload to R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          FILENAME="savants-${{ matrix.target }}.tar.gz"
          R2_API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/savants-releases/objects"

          curl -sf -X PUT "${R2_API}/${TAG}/${FILENAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${FILENAME}"
          echo "Uploaded to ${TAG}/${FILENAME}"

          curl -sf -X PUT "${R2_API}/latest/${FILENAME}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${FILENAME}"
          echo "Uploaded to latest/${FILENAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: savants-${{ matrix.target }}
          path: dist/savants-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [version, build]
    if: always() && needs.version.outputs.should_release == 'true' && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Build structured release notes
          {
            echo "## Install"
            echo ""
            echo '```sh'
            echo "curl -fsSL savants.sh | sh"
            echo '```'
            echo ""
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              # Features
              FEATS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --grep="^feat" -i 2>/dev/null)
              if [ -n "$FEATS" ]; then
                echo "### Features"
                echo "$FEATS"
                echo ""
              fi

              # Fixes
              FIXES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --grep="^fix" -i 2>/dev/null)
              if [ -n "$FIXES" ]; then
                echo "### Fixes"
                echo "$FIXES"
                echo ""
              fi

              # Other
              OTHER=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --invert-grep --grep="^feat" --grep="^fix" -i 2>/dev/null)
              if [ -n "$OTHER" ]; then
                echo "### Other"
                echo "$OTHER"
                echo ""
              fi
            else
              git log --pretty=format:"- %s" -20
              echo ""
            fi

            echo ""
            echo "## Binaries"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| Linux x86_64 | \`savants-x86_64-unknown-linux-gnu.tar.gz\` |"
            echo "| macOS Intel | \`savants-x86_64-apple-darwin.tar.gz\` |"
            echo "| macOS Apple Silicon | \`savants-aarch64-apple-darwin.tar.gz\` |"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Savants ${{ needs.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: artifacts/*/savants-*.tar.gz

      - name: Update version.txt and install.sh in R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          R2_API="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/buckets/savants-releases/objects"

          echo -n "${VERSION}" | curl -sf -X PUT "${R2_API}/latest/version.txt" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary "@-"
          echo "Updated version.txt to ${VERSION}"

          curl -sf -X PUT "${R2_API}/install.sh" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @scripts/install.sh
          echo "Updated install.sh"
